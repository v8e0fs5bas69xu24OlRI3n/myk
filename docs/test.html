<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Domain For Sale</title>

    <link rel="stylesheet" href="test.css">

</head>
<body>

<div class="page">

    <!-- ================= HERO ================= -->

    <section class="hero">

        <img
            src="images/logo.svg"
            alt="Spaceship"
            class="logo">

        <h2 class="subtitle">
            Domain for sale
        </h2>

        <h1 class="domain">
            SSQR.com
        </h1>

        <div class="features">

            <div class="feature">
                <span class="tick">✓</span>
                <span><strong>Free</strong> transaction support</span>
            </div>

            <div class="feature">
                <span class="tick">✓</span>
                <span><strong>Secure</strong> payments</span>
            </div>

            <div class="feature">
                <span class="tick">✓</span>
                <span><strong>Spaceship</strong> reliability</span>
            </div>

        </div>

    </section>

    <!-- ================= CARD ================= -->

    <section class="card">

        <form id="purchaseForm">

            <!-- BUY NOW -->

            <label class="option">

                <input
                    type="radio"
                    name="purchase"
                    data-url="https://example.com/buy">

                <span class="radio"></span>

                <div class="details">

                    <span class="title">
                        Buy now
                    </span>

                </div>

                <div class="price">

                    <span class="amount">
                        $185,650
                    </span>

                </div>

            </label>

            <!-- LEASE -->

            <label class="option">

                <input
                    type="radio"
                    name="purchase"
                    data-url="https://example.com/lease">

                <span class="radio"></span>

                <div class="details">

                    <span class="title">
                        Lease to own
                    </span>

                </div>

                <div class="price">

                    <span class="amount">
                        $9,250
                    </span>

                    <span class="months">
                        x24 months
                    </span>

                </div>

            </label>

        </form>

        <!-- PAYMENT METHODS -->

        <div class="payments">

            <p class="payments-title">
                Payment methods
            </p>

            <div class="payment-icons">

                <img src="images/visa.svg" alt="Visa">
                <img src="images/mastercard.svg" alt="Mastercard">
                <img src="images/amex.svg" alt="American Express">
                <img src="images/discover.svg" alt="Discover">
                <img src="images/googlepay.svg" alt="Google Pay">
                <img src="images/applepay.svg" alt="Apple Pay">
                <img src="images/paypal.svg" alt="PayPal">

            </div>

        </div>

        <!-- NEXT BUTTON -->

        <button
            type="button"
            id="nextButton">

            <span>Next</span>

            <svg width="22" height="22" viewBox="0 0 24 24">
                <path
                    d="M5 12H19M13 6L19 12L13 18"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2.2"
                    stroke-linecap="round"
                    stroke-linejoin="round"/>
            </svg>

        </button>

        <p class="redirect">

            You will be redirected to

            <strong>spaceship.com</strong>

        </p>

    </section>

</div>

<script src="test.js"></script>

</body>
</html>
