<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Lander</title>
<link rel="stylesheet" href="test.css">
</head>
<body>

<div class="page">

    <div class="top">

        <div class="logo">
            ▲
        </div>

        <h2>Domain for sale</h2>

        <h1>SSQR.com</h1>

        <div class="features">
            <p>✓ <b>Free</b> transaction support</p>
            <p>✓ <b>Secure</b> payments</p>
            <p>✓ <b>Spaceship</b> reliability</p>
        </div>

    </div>

    <div class="card">

        <div class="option active">
            <div class="radio"></div>

            <div class="label">
                <strong>Buy now</strong>
            </div>

            <div class="price">
                $185,650
            </div>
        </div>

        <div class="option">
            <div class="radio empty"></div>

            <div class="label">
                <strong>Lease to own</strong>
            </div>

            <div class="price">
                $9,250<br>
                <small>x24 months</small>
            </div>
        </div>

        <p class="payments">Payment methods</p>

        <div class="icons">
            💳 💳 💳 💳 💳 💳 💳 💳
        </div>

        <button>Next →</button>

        <p class="footer">
            You will be redirected to <b>spaceship.com</b>
        </p>

    </div>

</div>

</body>
</html>
