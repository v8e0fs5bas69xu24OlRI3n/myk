<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain for Sale</title>

    <link rel="stylesheet" href="test.css">
</head>
<body>

<div class="page">

    <!-- Hero -->
    <section class="hero">

        <div class="logo">
            <img src="logo.svg" alt="Logo">
        </div>

        <p class="subtitle">
            Domain for sale
        </p>

        <h1 class="domain">
            SSQR.com
        </h1>

        <div class="features">

            <div class="feature">
                <span class="check">✓</span>
                <span><strong>Free</strong> transaction support</span>
            </div>

            <div class="feature">
                <span class="check">✓</span>
                <span><strong>Secure</strong> payments</span>
            </div>

            <div class="feature">
                <span class="check">✓</span>
                <span><strong>Spaceship</strong> reliability</span>
            </div>

        </div>

    </section>

    <!-- Bottom Card -->
    <section class="card">

        <form id="purchaseForm">

            <label class="option">

                <input
                    type="radio"
                    name="purchase"
                    value="buy"
                    data-url="https://example.com/buy">

                <span class="radio"></span>

                <div class="option-content">

                    <div class="option-title">
                        Buy now
                    </div>

                </div>

                <div class="price">
                    $185,650
                </div>

            </label>


            <label class="option">

                <input
                    type="radio"
                    name="purchase"
                    value="lease"
                    data-url="https://example.com/lease">

                <span class="radio"></span>

                <div class="option-content">

                    <div class="option-title">
                        Lease to own
                    </div>

                </div>

                <div class="price">
                    <div>$9,250</div>
                    <small>x24 months</small>
                </div>

            </label>

        </form>

        <div class="payment-section">

            <p class="payment-title">
                Payment methods
            </p>

            <div class="payment-icons">

                <img src="images/visa.svg" alt="Visa">
                <img src="images/mastercard.svg" alt="Mastercard">
                <img src="images/amex.svg" alt="American Express">
                <img src="images/paypal.svg" alt="PayPal">
                <img src="images/googlepay.svg" alt="Google Pay">
                <img src="images/applepay.svg" alt="Apple Pay">

            </div>

        </div>

        <button
            id="nextButton"
            type="button">
            Next →
        </button>

        <p class="redirect-text">
            You will be redirected to
            <strong>spaceship.com</strong>
        </p>

    </section>

</div>

<script src="test.js"></script>

</body>
</html>
